steps:
  # 1. Container imajını Dockerfile kullanarak derle
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/techfix:$COMMIT_SHA', '.']

  # 2. Derlenen imajı Container Registry'ye gönder
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/techfix:$COMMIT_SHA']

  # 3. İmajı Cloud Run'a konuşlandır (Doğru servis adı "techfix" ve bölge "europe-west1" ile)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'techfix'
      - '--image'
      - 'gcr.io/$PROJECT_ID/techfix:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

# Şirket hesabındaki Log yetki sınırlandırmasını aşmak için loglamayı devre dışı bırakıyoruz
options:
  logging: NONE
